<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity Monitor</title>
  <link rel="stylesheet" href="/static/styles.css?v=8" />
</head>
<body>
  <header id="header">
    <div class="header-left">
      <span class="logo">&#9670; ACTIVITY MONITOR</span>
      <span id="hostname" class="header-hostname"></span>
    </div>
    <div class="header-right">
      <span id="clock" class="muted"></span>
      <span id="last-updated" class="muted"></span>
      <div class="refresh-controls">
        <button id="btn-refresh" class="btn btn-icon" title="Refresh now">&#8635;</button>
        <label class="toggle-label">
          <input type="checkbox" id="auto-refresh-toggle" checked />
          <span>Auto</span>
        </label>
        <select id="interval-select" class="select-sm">
          <option value="3">3s</option>
          <option value="5" selected>5s</option>
          <option value="10">10s</option>
          <option value="30">30s</option>
        </select>
      </div>
      <button id="btn-export" class="btn btn-sm">&#11015; Export JSON</button>
      <button id="btn-settings" class="btn btn-sm">&#9881; Settings</button>
    </div>
  </header>

  <nav id="tab-nav"></nav>
  <nav id="settings-nav"></nav>

  <main id="main-content">
    <div id="tab-panels"></div>
    <div id="settings-content"></div>
  </main>

  <script src="/static/chart.min.js?v=2"></script>
  <script src="/static/app.js?v=16"></script>
</body>
</html>
