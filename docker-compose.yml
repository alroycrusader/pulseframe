services:
  monitor:
    build: .
    image: vimsoft/pulseframe:latest
    container_name: ${CONTAINER_NAME:-pulseframe}
    ports:
      - "${BIND_HOST:-127.0.0.1}:${BIND_PORT:-8081}:8080"
    volumes:
      # Persistent storage (settings, SQLite metrics DB)
      - ./data:/app/data
      # Read-only mounts for host system information
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/hostname:/host/etc/hostname:ro
      - /var/run/utmp:/var/run/utmp:ro
    pid: "host"
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=utility,compute
    restart: unless-stopped
    privileged: false
